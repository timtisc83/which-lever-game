<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Which Lever? | ODCE</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --turquoise: #00C1D4;
      --blue: #143AFF;
      --violet: #7200FE;
      --mint: #5AFFC5;
      --red: #FF4F4F;
      --yellow: #FFDE36;
      --white: #FFFFFF;
      --bg: #F4F7FF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', 'Segoe UI', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #app { width: 100%; max-width: 660px; }

    .odce-mark {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      margin-bottom: 24px;
      color: var(--turquoise);
    }
    .odce-mark em { color: var(--blue); font-style: normal; font-size: 9px; font-weight: 400; letter-spacing: 1px; margin-left: 4px; }

    .screen {
      background: var(--white);
      border-radius: 16px;
      padding: 36px 32px;
      box-shadow: 0 4px 32px rgba(20,58,255,0.10);
      position: relative;
      overflow: hidden;
    }
    .screen-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, var(--turquoise), var(--blue));
    }

    /* Welcome */
    .welcome-title { font-size: 30px; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
    .welcome-sub { font-size: 14px; color: #555; margin-bottom: 24px; line-height: 1.6; }
    .lever-ref {
      background: var(--bg);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 24px;
      font-size: 13px;
    }
    .lever-ref p { font-weight: 600; color: var(--blue); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .lever-ref li { margin-left: 16px; color: #333; margin-bottom: 4px; line-height: 1.5; }
    .hint { font-size: 12px; color: #888; margin-bottom: 20px; }

    /* Buttons */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn--primary { background: var(--blue); color: var(--white); }
    .btn--primary:hover:not(:disabled) { background: #0a2bcc; transform: translateY(-1px); }
    .btn--primary:disabled { background: #c0c8f0; cursor: not-allowed; }
    .btn--secondary { background: var(--bg); color: var(--blue); border: 2px solid var(--blue); margin-top: 10px; }
    .btn--secondary:hover { background: #e8ecff; }

    /* Progress */
    .progress-wrap { margin-bottom: 20px; }
    .progress-label { font-size: 12px; color: #888; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-bar { height: 5px; background: #e0e5ff; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--turquoise), var(--blue)); border-radius: 10px; transition: width 0.4s; }

    /* Scenario */
    .scenario-title { font-size: 18px; font-weight: 700; color: var(--blue); margin-bottom: 12px; }
    .situation {
      font-size: 14px; line-height: 1.7; color: #333;
      background: var(--bg);
      border-left: 4px solid var(--turquoise);
      padding: 14px 16px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 18px;
    }
    .select-hint { font-size: 12px; color: #888; margin-bottom: 12px; font-style: italic; }
    .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }

    .option-card {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--white);
      border: 2px solid #dde3ff;
      border-radius: 10px;
      padding: 13px 16px;
      cursor: pointer;
      text-align: left;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      color: #222;
      transition: all 0.18s;
      width: 100%;
    }
    .option-card:hover { border-color: var(--blue); background: #f0f3ff; }
    .option-card.selected {
      border-color: var(--blue);
      background: #e8edff;
    }
    .option-card.selected .option-check { background: var(--blue); border-color: var(--blue); }
    .option-card.selected .option-check::after { display: block; }

    .option-check {
      width: 22px;
      height: 22px;
      border-radius: 5px;
      border: 2px solid #c0c8f0;
      background: white;
      flex-shrink: 0;
      margin-top: 1px;
      position: relative;
      transition: all 0.15s;
    }
    .option-check::after {
      content: '';
      display: none;
      position: absolute;
      top: 3px; left: 6px;
      width: 6px; height: 11px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    /* Feedback */
    .feedback-card {
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .feedback-card--good  { background: rgba(90,255,197,0.15); border: 2px solid var(--mint); }
    .feedback-card--partial { background: rgba(255,222,54,0.15); border: 2px solid var(--yellow); }
    .feedback-card--bad   { background: rgba(255,79,79,0.12); border: 2px solid var(--red); }

    .fb-score { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .fb-score--good { color: #00995a; }
    .fb-score--partial { color: #a07800; }
    .fb-score--bad { color: var(--red); }

    .fb-section { margin-bottom: 12px; }
    .fb-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #777; margin-bottom: 6px; }
    .fb-option-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; line-height: 1.5; color: #333; margin-bottom: 6px; }
    .fb-tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px;
      white-space: nowrap; flex-shrink: 0; margin-top: 2px;
    }
    .fb-tag--correct { background: var(--mint); color: #005a35; }
    .fb-tag--incorrect { background: #ffd0d0; color: #a00; }
    .fb-tag--missed { background: #ffe8b0; color: #7a5000; }

    .fb-explanation { font-size: 13px; line-height: 1.6; color: #333; margin-top: 10px; border-top: 1px solid rgba(0,0,0,0.08); padding-top: 10px; }

    .score-running { margin-top: 14px; font-size: 13px; color: #666; font-weight: 600; }

    /* Results */
    .results-center { text-align: center; margin-bottom: 24px; }
    .tier-badge {
      display: inline-block; padding: 5px 18px; border-radius: 20px;
      font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      margin-bottom: 14px; color: #000;
    }
    .results-title { font-size: 18px; font-weight: 600; color: #333; margin-bottom: 6px; }
    .score-big { font-size: 72px; font-weight: 700; color: var(--blue); line-height: 1; }
    .score-big span { font-size: 28px; color: #aaa; }
    .tier-msg { font-size: 14px; color: #555; margin-top: 12px; line-height: 1.6; }

    .summary-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
    .summary-table th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #999; padding: 6px 8px; border-bottom: 2px solid #eee; }
    .summary-table td { padding: 9px 8px; border-bottom: 1px solid #f0f0f0; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
const GAME_DATA = {
  title: "Which Lever?",
  subtitle: "Three companies. Something smells off. Which lever — or levers — are being pulled?",
  scenarios: [
    {
      id: 1,
      title: "The Booming Revenue",
      situation: "NordRetail AG reports 28% revenue growth this year. The CEO celebrates in the annual report. Accounts receivable tripled versus last year. Operating cash flow dropped 40%. The auditor flags nothing.",
      instruction: "Select all levers that apply.",
      options: [
        {
          text: "Lever 1 — Revenue too early: sales booked before cash is collected or obligations are met",
          correct: true,
          feedback: "Yes. Revenue ↑ while CFO ↓ with receivables piling up is the textbook Lever 1 signal."
        },
        {
          text: "Lever 2 — Costs pushed back: expenses capitalized to inflate current profit",
          correct: false,
          feedback: "No signal for this here. Lever 2 shows up as rising intangible assets — not exploding receivables."
        },
        {
          text: "Lever 3 — Assets fabricated: the receivables may not actually exist",
          correct: false,
          feedback: "Possible in theory, but without further evidence Lever 1 is the primary explanation. Fabricated receivables (Lever 3) would require additional red flags."
        }
      ],
      explanation: "Receivables growing much faster than revenue, while cash flow falls, is the classic Lever 1 pattern: revenue is recognized before it is earned or collected."
    },
    {
      id: 2,
      title: "The Vanishing R&D Cost",
      situation: "SoftCore GmbH develops enterprise software. This year R&D expense dropped 45% — yet headcount stayed the same. A line called 'Capitalized Development Costs' on the balance sheet doubled. Net income is up 22%.",
      instruction: "Select all levers that apply.",
      options: [
        {
          text: "Lever 1 — Revenue too early: future license fees are counted as revenue now",
          correct: false,
          feedback: "No revenue signal here. The issue is on the cost side, not the revenue side."
        },
        {
          text: "Lever 2 — Costs pushed back: R&D spending moved from the income statement to the balance sheet",
          correct: true,
          feedback: "Yes. Same headcount, 45% lower R&D expense — the cost didn't disappear, it was capitalized. Profit looks better now; the write-down comes later."
        },
        {
          text: "Lever 3 — Assets fabricated: the capitalized costs are invented and don't reflect real work",
          correct: false,
          feedback: "At the extreme this could become Lever 3, but the primary mechanism is Lever 2. Fabrication would require further evidence."
        }
      ],
      explanation: "Capitalizing costs that should be expensed (Lever 2) inflates both profit and the balance sheet. IFRS allows it under strict conditions — but the same headcount with half the expense is suspicious."
    },
    {
      id: 3,
      title: "The Phantom Cash & The Entity Maze",
      situation: "EnerPay Corp is a payments and energy trading group. It reports €2 bn in cash at partner banks abroad, but CFO/NI is 0.3× and the company refinanced debt twice this year. Revenues grew 35% — all from long-term contracts booked at their estimated lifetime value upfront. Footnote 42 reveals €4 bn in off-balance-sheet obligations via subsidiary entities. The auditor changed 18 months ago.",
      instruction: "Select all levers that apply.",
      options: [
        {
          text: "Lever 1 — Revenue too early: future contract profits counted as current revenue",
          correct: true,
          feedback: "Yes. Booking the full lifetime value of long-term contracts immediately is mark-to-market abuse — the Enron pattern."
        },
        {
          text: "Lever 2 — Costs pushed back: losses are being deferred via capitalization",
          correct: false,
          feedback: "No clear Lever 2 signal. The issues are on the revenue side and the balance sheet, not cost timing."
        },
        {
          text: "Lever 3 — Assets fabricated or debt hidden: phantom cash and off-balance-sheet debt",
          correct: true,
          feedback: "Yes — both. The €2 bn in unverifiable cash (Wirecard pattern) and the €4 bn in footnote liabilities hidden via subsidiary structures (Enron pattern) are both Lever 3."
        }
      ],
      explanation: "This scenario combines Lever 1 (premature revenue from long-term contracts, à la Enron) and Lever 3 (phantom cash à la Wirecard, plus off-balance-sheet debt à la Enron). Two levers, two famous frauds."
    }
  ],
  scoring: {
    perScenario: 3,
    tiers: [
      { min: 8, label: "Chief Analyst", color: "#5AFFC5", message: "Excellent. You spotted all the signals correctly." },
      { min: 5, label: "Sharp Practitioner", color: "#00C1D4", message: "Good instincts. A few signals slipped past — review the feedback." },
      { min: 0, label: "Keep Digging", color: "#FFDE36", message: "Fraud detection takes practice. Revisit the three levers and try again." }
    ]
  }
};

// ── STATE ────────────────────────────────────────────────────────────────────
const state = {
  screen: 'welcome',
  scenarioIndex: 0,
  score: 0,
  totalAnswered: 0,
  selected: [],       // array of booleans for current scenario
  results: []         // {scenarioId, selected, pointsEarned}
};

function setState(updates) { Object.assign(state, updates); render(); }

// ── SCORING ──────────────────────────────────────────────────────────────────
function scoreScenario(scenario, selected) {
  // +1 for each correct option selected, -1 for each incorrect option selected, min 0
  // max 3 per scenario
  const opts = scenario.options;
  let pts = 0;
  opts.forEach((o, i) => {
    if (selected[i] && o.correct) pts++;
    if (selected[i] && !o.correct) pts--;
  });
  return Math.max(0, pts);
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function odceMark() {
  return `<div class="odce-mark">ODCE<em>· TUHH</em></div>`;
}

// ── SCREENS ──────────────────────────────────────────────────────────────────
function renderWelcome() {
  return `
    <div class="screen">
      <div class="screen-accent"></div>
      ${odceMark()}
      <div class="welcome-title">${GAME_DATA.title}</div>
      <p class="welcome-sub">${GAME_DATA.subtitle}</p>
      <div class="lever-ref">
        <p>The three levers</p>
        <ul>
          <li><strong>Lever 1</strong> — Revenue too early / too high</li>
          <li><strong>Lever 2</strong> — Costs pushed back (capitalized)</li>
          <li><strong>Lever 3</strong> — Assets fabricated or debt hidden</li>
        </ul>
      </div>
      <p class="hint">Each scenario may have one or more correct levers. Select all that apply.</p>
      <button id="start-btn" class="btn btn--primary">Start →</button>
    </div>`;
}

function renderScenario() {
  const s = GAME_DATA.scenarios[state.scenarioIndex];
  const progress = state.scenarioIndex + 1;
  const total = GAME_DATA.scenarios.length;
  const sel = state.selected.length === s.options.length ? state.selected : s.options.map(() => false);

  const anySelected = sel.some(Boolean);

  return `
    <div class="screen">
      <div class="screen-accent"></div>
      ${odceMark()}
      <div class="progress-wrap">
        <div class="progress-label">
          <span>Scenario ${progress} of ${total}</span>
          <span>Score: ${state.score}</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${(progress/total)*100}%"></div></div>
      </div>
      <h2 class="scenario-title">${s.title}</h2>
      <p class="situation">${s.situation}</p>
      <p class="select-hint">${s.instruction}</p>
      <div class="options">
        ${s.options.map((o, i) => `
          <button class="option-card ${sel[i] ? 'selected' : ''}" data-index="${i}">
            <span class="option-check"></span>
            <span>${o.text}</span>
          </button>`).join('')}
      </div>
      <button id="confirm-btn" class="btn btn--primary" ${anySelected ? '' : 'disabled'}>Confirm →</button>
    </div>`;
}

function renderFeedback() {
  const s = GAME_DATA.scenarios[state.scenarioIndex];
  const sel = state.selected;
  const pts = scoreScenario(s, sel);
  const max = s.options.filter(o => o.correct).length;
  const cls = pts === max ? 'good' : pts > 0 ? 'partial' : 'bad';
  const scoreCls = pts === max ? 'fb-score--good' : pts > 0 ? 'fb-score--partial' : 'fb-score--bad';
  const emoji = pts === max ? '✓ ' : pts > 0 ? '~ ' : '✗ ';
  const isLast = state.scenarioIndex >= GAME_DATA.scenarios.length - 1;

  const optRows = s.options.map((o, i) => {
    let tag, tagClass;
    if (sel[i] && o.correct)   { tag = 'Correct ✓';   tagClass = 'fb-tag--correct'; }
    else if (sel[i] && !o.correct) { tag = 'Wrong ✗';  tagClass = 'fb-tag--incorrect'; }
    else if (!sel[i] && o.correct) { tag = 'Missed';   tagClass = 'fb-tag--missed'; }
    else return '';

    return `<div class="fb-option-row">
      <span class="fb-tag ${tagClass}">${tag}</span>
      <span>${o.text}<br><em style="color:#888;font-size:12px">${o.feedback}</em></span>
    </div>`;
  }).join('');

  return `
    <div class="screen">
      <div class="screen-accent"></div>
      ${odceMark()}
      <div class="feedback-card feedback-card--${cls}">
        <div class="fb-score ${scoreCls}">${emoji}${pts} of ${max} point${max !== 1 ? 's' : ''}</div>
        <div class="fb-section">
          <div class="fb-section-title">Your choices</div>
          ${optRows}
        </div>
        <div class="fb-explanation">${s.explanation}</div>
      </div>
      <div class="score-running">Running total: <strong>${state.score} pts</strong></div>
      <button id="next-btn" class="btn btn--primary" style="margin-top:16px">${isLast ? 'See Results →' : 'Next Scenario →'}</button>
    </div>`;
}

function renderResults() {
  const max = GAME_DATA.scenarios.reduce((s, sc) => s + sc.options.filter(o => o.correct).length, 0);
  const tier = GAME_DATA.scoring.tiers.find(t => state.score >= t.min);

  const rows = state.results.map((r, i) => {
    const s = GAME_DATA.scenarios[i];
    const scenarioMax = s.options.filter(o => o.correct).length;
    return `<tr>
      <td>${s.title}</td>
      <td style="text-align:right;font-weight:700;color:var(--blue)">${r.pointsEarned} / ${scenarioMax}</td>
    </tr>`;
  }).join('');

  return `
    <div class="screen">
      <div class="screen-accent"></div>
      ${odceMark()}
      <div class="results-center">
        <div class="tier-badge" style="background:${tier.color}">${tier.label}</div>
        <div class="results-title">Your final score</div>
        <div class="score-big">${state.score}<span> / ${max}</span></div>
        <p class="tier-msg">${tier.message}</p>
      </div>
      <table class="summary-table">
        <thead><tr><th>Scenario</th><th style="text-align:right">Points</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <button id="play-again" class="btn btn--secondary">Play Again</button>
    </div>`;
}

// ── RENDER + LISTENERS ───────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  switch (state.screen) {
    case 'welcome':  app.innerHTML = renderWelcome(); break;
    case 'scenario': app.innerHTML = renderScenario(); break;
    case 'feedback': app.innerHTML = renderFeedback(); break;
    case 'results':  app.innerHTML = renderResults(); break;
  }
  attachListeners();
}

function attachListeners() {
  const startBtn = document.getElementById('start-btn');
  if (startBtn) startBtn.addEventListener('click', () => {
    setState({ screen: 'scenario', scenarioIndex: 0, score: 0, selected: [], results: [] });
  });

  document.querySelectorAll('.option-card').forEach(btn => {
    btn.addEventListener('click', () => {
      const i = parseInt(btn.dataset.index);
      const s = GAME_DATA.scenarios[state.scenarioIndex];
      const sel = state.selected.length === s.options.length
        ? [...state.selected]
        : s.options.map(() => false);
      sel[i] = !sel[i];
      setState({ selected: sel, screen: 'scenario' });
    });
  });

  const confirmBtn = document.getElementById('confirm-btn');
  if (confirmBtn) confirmBtn.addEventListener('click', () => {
    const s = GAME_DATA.scenarios[state.scenarioIndex];
    const sel = state.selected.length === s.options.length
      ? state.selected
      : s.options.map(() => false);
    const pts = scoreScenario(s, sel);
    const newResults = [...state.results, { scenarioId: s.id, selected: sel, pointsEarned: pts }];
    setState({ score: state.score + pts, results: newResults, screen: 'feedback' });
  });

  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.addEventListener('click', () => {
    const isLast = state.scenarioIndex >= GAME_DATA.scenarios.length - 1;
    if (isLast) {
      setState({ screen: 'results' });
    } else {
      setState({ screen: 'scenario', scenarioIndex: state.scenarioIndex + 1, selected: [] });
    }
  });

  const playAgain = document.getElementById('play-again');
  if (playAgain) playAgain.addEventListener('click', () => {
    setState({ screen: 'welcome', scenarioIndex: 0, score: 0, selected: [], results: [] });
  });
}

render();
</script>
</body>
</html>
